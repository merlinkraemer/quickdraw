extracts:
  user-corrections:
    description: User corrections, redirects, and stated preferences
    persist: .pi/session-state/corrections.json
    format: |
      Array of { timestamp: number, correction: string, context: string }
    strategy: mechanical
    maxEntries: 50
    priority: high

  decisions:
    description: Architectural decisions with rationale
    persist: .pi/session-state/decisions.json
    format: |
      Array of { decision: string, rationale: string, files_affected: string[] }
    strategy: llm
    maxTokens: 2000
    priority: high

  file-awareness:
    description: Files read, modified, and created during the session
    persist: .pi/session-state/files.json
    format: |
      { read: string[], modified: string[] }
    strategy: mechanical
    priority: low

  task-state:
    description: Current goal, progress, blockers, and next steps
    persist: .pi/session-state/task.json
    format: |
      { goal: string, constraints: string[], done: string[], in_progress: string[], blocked: string[], next_steps: string[] }
    strategy: llm
    maxTokens: 2000
    priority: critical

reassemble:
  budget: 12000
  overflow: trim-lowest
  sources:
    - source: .pi/session-state/task.json
      as: "Task state:"
      wrap: task-state
    - source: .pi/session-state/corrections.json
      as: "User corrections and preferences (must be honored):"
      wrap: user-corrections
    - source: .pi/session-state/decisions.json
      as: "Architectural decisions made:"
      wrap: decisions
    - source: .pi/session-state/files.json
      as: "Files touched:"
      wrap: file-context
